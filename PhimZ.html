<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NguyeZ Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .movie-card:hover .quick-info { opacity: 1; transform: translateY(0); }
        #player-modal { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .active-filter { background: #ef4444 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-[#0b0b0b] text-gray-200">

    <aside class="fixed left-0 top-0 h-full w-16 bg-[#121212] flex flex-col items-center py-6 gap-8 border-r border-white/5 z-50">
        <div class="text-red-600 text-2xl font-black">N.</div>
        <i onclick="location.reload()" class="fa fa-home text-white cursor-pointer hover:text-red-500"></i>
        <i onclick="showFavorites()" class="fa fa-heart cursor-pointer hover:text-red-500"></i>
    </aside>

    <main class="ml-16 p-6">
        <header class="mb-10 flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <h1 id="title" class="text-xl font-bold uppercase tracking-widest">Mới Cập Nhật</h1>
                <input type="text" id="search" onkeyup="if(event.key==='Enter') searchMovie(this.value)" placeholder="Tìm kiếm..." class="bg-[#1a1a1a] border border-white/10 rounded-full px-6 py-2 text-sm outline-none focus:border-red-500 w-64">
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="fetchData('phim-moi-cap-nhat')" class="btn-filter px-5 py-1.5 rounded-full bg-[#1a1a1a] border border-white/5 text-[11px] active-filter">TẤT CẢ</button>
                <button onclick="fetchData('phim-bo')" class="btn-filter px-5 py-1.5 rounded-full bg-[#1a1a1a] border border-white/5 text-[11px]">PHIM BỘ</button>
                <button onclick="fetchData('phim-le')" class="btn-filter px-5 py-1.5 rounded-full bg-[#1a1a1a] border border-white/5 text-[11px]">PHIM LẺ</button>
                <button onclick="fetchData('hoat-hinh')" class="btn-filter px-5 py-1.5 rounded-full bg-[#1a1a1a] border border-white/5 text-[11px]">HOẠT HÌNH</button>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        <div class="flex justify-center py-10"><button id="more" class="px-10 py-2 bg-white/5 border border-white/10 rounded-full text-xs hover:bg-white hover:text-black transition">XEM THÊM</button></div>
    </main>

    <div id="player-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-black rounded-xl overflow-hidden shadow-2xl relative">
            <button onclick="closePlayer()" class="absolute top-4 right-4 z-10 text-white/50 hover:text-white"><i class="fa fa-times text-xl"></i></button>
            <div id="artplayer" class="aspect-video"></div>
            <div id="info" class="p-6 bg-[#121212]"></div>
        </div>
    </div>

    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        const API = "https://ophim17.cc/_api/v1/danh-sach/";
        let page = 1, slug = 'phim-moi-cap-nhat';

        async function fetchData(s, p = 1) {
            slug = s; page = p;
            const grid = document.getElementById('grid');
            if(p === 1) grid.innerHTML = '<p class="col-span-full text-center py-20 opacity-50 italic">Đang tải...</p>';
            
            try {
                const url = `${API}${slug}?page=${p}`;
                const res = await fetch(PROXY + encodeURIComponent(url));
                const json = await res.json();
                render(json.data.items, p !== 1);
            } catch (e) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-red-500">Lỗi kết nối API. Hãy nhấn F5 hoặc thử lại sau.</p>';
            }
        }

        function render(items, append) {
            const grid = document.getElementById('grid');
            if(!append) grid.innerHTML = '';
            items.forEach(m => {
                const thumb = `https://ophim17.cc/_api/v1/../${m.thumb_url}`;
                grid.innerHTML += `
                    <div class="movie-card relative bg-[#1a1a1a] rounded-lg overflow-hidden group">
                        <img src="${thumb}" class="w-full h-64 object-cover opacity-80 group-hover:opacity-30 transition">
                        <div class="quick-info absolute inset-0 p-4 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition">
                            <h3 class="text-xs font-bold mb-3">${m.name}</h3>
                            <button onclick="play('${m.slug}')" class="w-full py-2 bg-red-600 text-[10px] font-bold rounded">XEM</button>
                        </div>
                        <div class="p-2 text-[10px] truncate font-medium">${m.name}</div>
                    </div>
                `;
            });
        }

        async function play(s) {
            const res = await fetch(PROXY + encodeURIComponent(`https://ophim17.cc/_api/v1/phim/${s}`));
            const json = await res.json();
            const item = json.data.item;
            const link = item.episodes[0].server_data[0].link_m3u8;

            document.getElementById('player-modal').style.display = 'flex';
            document.getElementById('info').innerHTML = `<h2 class="font-bold">${item.name}</h2><p class="text-[10px] text-gray-500 mt-1">${item.origin_name} (${item.year})</p>`;
            
            new Artplayer({
                container: '#artplayer', url: link, type: 'm3u8', autoplay: true, fullscreen: true, setting: true,
                customType: { m3u8: (v, u) => { if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(u); hls.attachMedia(v); } } }
            });
        }

        function closePlayer() { document.getElementById('player-modal').style.display = 'none'; }
        document.getElementById('more').onclick = () => fetchData(slug, ++page);
        fetchData('phim-moi-cap-nhat');
    </script>
</body>
</html>
