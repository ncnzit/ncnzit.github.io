<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCinema - Minimalist Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .movie-card:hover .quick-info { opacity: 1; transform: translateY(0); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #player-modal { backdrop-filter: blur(10px); display: none; }
    </style>
</head>
<body class="bg-[#0f0f0f] text-gray-200 font-sans hide-scroll">

    <aside class="fixed left-0 top-0 h-full w-20 bg-[#161616] flex flex-col items-center py-8 gap-10 border-r border-white/5 z-40">
        <div class="text-red-600 text-2xl font-bold">O.</div>
        <nav class="flex flex-col gap-8 text-gray-500">
            <i class="fa fa-home text-white text-xl cursor-pointer"></i>
            <i class="fa fa-film hover:text-white cursor-pointer transition"></i>
            <i class="fa fa-tv hover:text-white cursor-pointer transition"></i>
            <i class="fa fa-heart hover:text-white cursor-pointer transition"></i>
        </nav>
    </aside>

    <main class="ml-20 p-8">
        <header class="flex flex-col gap-6 mb-10">
            <div class="flex justify-between items-center">
                <h1 id="category-title" class="text-2xl font-semibold tracking-tight">Mới cập nhật</h1>
                <div class="bg-[#1a1a1a] px-4 py-2 rounded-full border border-white/10 w-96 flex items-center">
                    <i class="fa fa-search text-gray-500 mr-3"></i>
                    <input type="text" id="search-input" placeholder="Tìm tên phim..." class="bg-transparent outline-none w-full text-sm">
                </div>
            </div>

            <div class="flex gap-3 flex-wrap">
                <button onclick="fetchMovies('phim-moi-cap-nhat')" class="px-4 py-1.5 rounded-full bg-red-600 text-xs font-medium">Tất cả</button>
                <button onclick="fetchMovies('phim-bo')" class="px-4 py-1.5 rounded-full bg-[#1a1a1a] border border-white/10 text-xs hover:border-white/40">Phim Bộ</button>
                <button onclick="fetchMovies('phim-le')" class="px-4 py-1.5 rounded-full bg-[#1a1a1a] border border-white/10 text-xs hover:border-white/40">Phim Lẻ</button>
                <button onclick="fetchMovies('hoat-hinh')" class="px-4 py-1.5 rounded-full bg-[#1a1a1a] border border-white/10 text-xs hover:border-white/40">Hoạt Hình</button>
            </div>
        </header>

        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>

        <div class="flex justify-center mt-12">
            <button id="load-more" class="px-8 py-2 border border-white/10 rounded-full hover:bg-white hover:text-black transition text-sm">Xem thêm</button>
        </div>
    </main>

    <div id="player-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
        <div class="w-full max-w-5xl bg-[#161616] rounded-2xl overflow-hidden relative">
            <button onclick="closePlayer()" class="absolute top-4 right-4 z-[60] text-white/50 hover:text-white"><i class="fa fa-times text-2xl"></i></button>
            <div id="artplayer" class="aspect-video w-full"></div>
            <div id="movie-info" class="p-6">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://ophim17.cc/_api/v1/danh-sach/";
        const IMG_URL = "https://img.phimmoichill.org/images/"; // Base URL for posters
        let currentPage = 1;
        let currentSlug = 'phim-moi-cap-nhat';

        async function fetchMovies(slug, page = 1) {
            currentSlug = slug;
            const res = await fetch(`${API_URL}${slug}?page=${page}`);
            const data = await res.json();
            renderMovies(data.data.items, page !== 1);
        }

        function renderMovies(movies, append) {
            const grid = document.getElementById('movie-grid');
            if (!append) grid.innerHTML = '';
            
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = "movie-card relative group cursor-pointer overflow-hidden rounded-xl bg-[#161616]";
                card.innerHTML = `
                    <img src="https://ophim17.cc/_api/v1/../${movie.thumb_url}" class="w-full h-[320px] object-cover transition duration-500 group-hover:scale-105 group-hover:opacity-20">
                    <div class="quick-info absolute inset-0 p-4 flex flex-col justify-end opacity-0 transition-all duration-300 transform translate-y-4">
                        <span class="text-[10px] bg-red-600 w-fit px-2 py-0.5 rounded mb-2">${movie.year}</span>
                        <h3 class="font-bold text-sm leading-tight mb-4">${movie.name}</h3>
                        <button onclick="playMovie('${movie.slug}')" class="bg-white text-black text-[10px] px-3 py-1.5 rounded-md font-bold w-full">XEM NGAY</button>
                    </div>
                    <div class="p-3">
                        <p class="text-[12px] font-medium truncate">${movie.name}</p>
                        <p class="text-[10px] text-gray-500 mt-1">${movie.origin_name}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function playMovie(slug) {
            const res = await fetch(`https://ophim17.cc/_api/v1/phim/${slug}`);
            const data = await res.json();
            const movie = data.data.item;
            const streamUrl = movie.episodes[0].server_data[0].link_m3u8;

            document.getElementById('player-modal').style.display = 'flex';
            document.getElementById('movie-info').innerHTML = `
                <h2 class="text-xl font-bold">${movie.name}</h2>
                <p class="text-sm text-gray-400 mt-2">${movie.content.replace(/<[^>]*>/g, '').substring(0, 200)}...</p>
            `;

            new Artplayer({
                container: '#artplayer',
                url: streamUrl,
                type: 'm3u8',
                customType: {
                    m3u8: function (video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        }
                    },
                },
                fullscreen: true,
                setting: true,
            });
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
        }

        // Initial fetch
        fetchMovies('phim-moi-cap-nhat');

        // Load more logic
        document.getElementById('load-more').onclick = () => {
            currentPage++;
            fetchMovies(currentSlug, currentPage);
        };
    </script>
</body>
</html>
